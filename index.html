<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>DAYCLIK!</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#f4f5f7;font-family:'Apple SD Gothic Neo','AppleSDGothicNeo',sans-serif;}
    input,button{font-family:inherit;}
    ::-webkit-scrollbar{display:none;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Firebase ──
    const firebaseConfig = {
      apiKey: "AIzaSyCEEFEtb-X8FEb0HJIXKoRnkgUTypCHpM0",
      authDomain: "day-click.firebaseapp.com",
      projectId: "day-click",
      storageBucket: "day-click.firebasestorage.app",
      messagingSenderId: "1067942080443",
      appId: "1:1067942080443:web:9b02f516ef6fcc198d9e9e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── Cloudinary ──
    const CLD_CLOUD = "duahjg6jf";
    const CLD_PRESET = "claude";

    async function uploadToCloudinary(dataUrl) {
      const blob = await (await fetch(dataUrl)).blob();
      const form = new FormData();
      form.append("file", blob);
      form.append("upload_preset", CLD_PRESET);
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`, { method:"POST", body:form });
      const data = await res.json();
      return data.secure_url;
    }

    const DEFAULT_CHALLENGES = [
      "주변에서 초록색 사물을 찾아 찍어주세요","현재 감정을 사진으로 표현해주세요","오늘의 기분을 담은 사진을 찍어주세요",
      "동그란 형태의 사물을 찾아 찍어주세요","빛과 그림자가 있는 장면을 찍어주세요","지금 이 순간 가장 아름다운 것을 찍어주세요",
      "차가운 느낌의 사물이나 장면을 찍어주세요","따뜻한 색감의 사진을 찍어주세요","숨어있는 패턴이나 반복되는 형태를 찍어주세요",
      "지금 당신의 손이 닿는 곳을 찍어주세요","하늘을 올려다보고 찍어주세요","가장 가까이 있는 음식이나 음료를 찍어주세요",
      "창문 너머로 보이는 풍경을 찍어주세요","지금 신고 있는 신발을 찍어주세요","내 손으로 만든 것을 찍어주세요",
      "가장 좋아하는 색깔이 담긴 사물을 찍어주세요","멀리서 보이는 건물을 찍어주세요","오늘 내가 앉아 있는 공간을 찍어주세요",
      "가장 작은 사물을 찾아 찍어주세요","가장 오래된 물건을 찍어주세요","그림자만 찍어주세요",
      "반짝이는 것을 찾아 찍어주세요","오늘의 날씨를 담아주세요","걸어가다 발견한 흥미로운 것을 찍어주세요",
      "지금 내 마음 상태를 색으로 표현한 사진을 찍어주세요","오늘 처음 만진 물체를 찍어주세요","나만 아는 비밀 장소를 찍어주세요",
      "오늘 가장 많이 본 사물을 찍어주세요","내가 좋아하는 질감의 표면을 찍어주세요","지금 이 순간 나를 둘러싼 소리의 근원을 찍어주세요",
    ];
    const PRESET_COLORS = [
      {name:"민트",value:"#4abad4"},{name:"라벤더",value:"#9b8ec4"},{name:"코랄",value:"#f28b82"},
      {name:"피치",value:"#f9a875"},{name:"스카이",value:"#74b9ff"},{name:"세이지",value:"#81c784"},
      {name:"로즈",value:"#f48fb1"},{name:"골드",value:"#ffd54f"},
    ];
    const MAIN_TABS=["Challenge","Calendar","Settings"];
    const SETTINGS_ITEMS=["프로필","친구 관리","챌린지 설정","테마 색상"];
    const CAL_DAYS=["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const JALNAN="'여기어때 잘난체','Apple SD Gothic Neo',sans-serif";
    const FONT="'Apple SD Gothic Neo','AppleSDGothicNeo',sans-serif";

    function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
    function lighten(h,a=0.12){const{r,g,b}=hexToRgb(h);return`rgba(${r},${g},${b},${a})`;}
    function pastel(h){const{r,g,b}=hexToRgb(h);return`rgb(${Math.round(r+(255-r)*0.62)},${Math.round(g+(255-g)*0.62)},${Math.round(b+(255-b)*0.62)})`;}
    function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}
    function getHourKey(){const n=new Date();return`${n.getFullYear()}-${n.getMonth()}-${n.getDate()}-${n.getHours()}`;}
    function getDateKey(d=new Date()){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
    function pickChallenge(chs,hk){let h=0;for(let c of hk)h=(h*31+c.charCodeAt(0))%chs.length;return chs[Math.abs(h)%chs.length];}
    function getDIM(y,m){return new Date(y,m+1,0).getDate();}
    function getFD(y,m){return new Date(y,m,1).getDay();}

    function App() {
      const [mainTab,setMainTab]=useState(0);
      const [settingsPage,setSettingsPage]=useState(null);
      const [groupCode,setGroupCode]=useState("");
      const [inputCode,setInputCode]=useState("");
      const [joined,setJoined]=useState(false);
      const [challenges,setChallenges]=useState(DEFAULT_CHALLENGES);
      const [newChallenge,setNewChallenge]=useState("");
      const [hourKey,setHourKey]=useState(getHourKey());
      const [started,setStarted]=useState(false);
      const [timeLeft,setTimeLeft]=useState(60);
      const [expired,setExpired]=useState(false);
      const [fsPhotos,setFsPhotos]=useState([]);
      const [commentInputs,setCommentInputs]=useState({});
      const [calDate,setCalDate]=useState(new Date());
      const [aiLoading,setAiLoading]=useState(false);
      const [uploading,setUploading]=useState(false);
      const [userName,setUserName]=useState("");
      const [nameInput,setNameInput]=useState("");
      const [cameraActive,setCameraActive]=useState(false);
      const [accent,setAccent]=useState("#4abad4");
      const [friends,setFriends]=useState([]);
      const [friendInput,setFriendInput]=useState("");
      const [profileImg,setProfileImg]=useState(null);
      const [profileNameEdit,setProfileNameEdit]=useState("");
      const [customColors,setCustomColors]=useState([]);
      const [pickerColor,setPickerColor]=useState("#ff9999");
      const [pickerName,setPickerName]=useState("");
      const [calTitles,setCalTitles]=useState({});
      const [calTitleInput,setCalTitleInput]=useState("");
      const [calTitleModal,setCalTitleModal]=useState(null);
      const [calDetailDay,setCalDetailDay]=useState(null);
      const [calEditModal,setCalEditModal]=useState(null);

      const videoRef=useRef(),canvasRef=useRef(),streamRef=useRef(),timerRef=useRef(),profileFileRef=useRef();
      const today=getDateKey();
      const L=lighten(accent,0.12),ML=lighten(accent,0.25),PS=pastel(accent);
      const cur=pickChallenge(challenges,hourKey);

      // Firestore 구독
      useEffect(()=>{
        if(!groupCode)return;
        return db.collection("groups").doc(groupCode).collection("photos")
          .orderBy("ts","desc")
          .onSnapshot(snap=>setFsPhotos(snap.docs.map(d=>({id:d.id,...d.data()}))));
      },[groupCode]);

      useEffect(()=>{
        const iv=setInterval(()=>{const nk=getHourKey();if(nk!==hourKey){setHourKey(nk);setStarted(false);setExpired(false);setTimeLeft(60);}},5000);
        return()=>clearInterval(iv);
      },[hourKey]);

      useEffect(()=>{
        if(!cameraActive)return;
        if(timeLeft<=0){stopCamera();setExpired(true);setStarted(false);return;}
        timerRef.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);
        return()=>clearTimeout(timerRef.current);
      },[cameraActive,timeLeft]);

      useEffect(()=>()=>stopCamera(),[]);

      const todayPhotos=fsPhotos.filter(p=>p.dateKey===today);
      const hasPhoto=todayPhotos.some(p=>p.hourKey===hourKey&&p.user===userName);

      async function openCamera(){
        try{
          const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
          streamRef.current=stream;setCameraActive(true);setTimeLeft(60);
          setTimeout(()=>{if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}},80);
        }catch{alert("카메라 접근 권한이 필요합니다.");setStarted(false);}
      }
      function stopCamera(){if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}setCameraActive(false);}

      async function capturePhoto(){
        const video=videoRef.current,canvas=canvasRef.current;if(!video||!canvas)return;
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        canvas.getContext("2d").drawImage(video,0,0);
        const dataUrl=canvas.toDataURL("image/jpeg",0.85);
        stopCamera();setUploading(true);
        try{
          const url=await uploadToCloudinary(dataUrl);
          await db.collection("groups").doc(groupCode).collection("photos").add({
            hourKey,dateKey:today,challenge:cur,url,user:userName,comments:[],ts:firebase.firestore.FieldValue.serverTimestamp()
          });
        }catch(e){alert("업로드 실패: "+e.message);}
        setUploading(false);setStarted(false);setExpired(false);
      }

      async function addComment(photoId,text){
        if(!text.trim())return;
        await db.collection("groups").doc(groupCode).collection("photos").doc(photoId).update({
          comments:firebase.firestore.FieldValue.arrayUnion({user:userName,text,ts:Date.now()})
        });
        setCommentInputs(p=>({...p,[photoId]:""}));
      }

      async function generateAi(){
        if(!newChallenge.trim()){alert("주제를 먼저 입력해주세요.");return;}
        setAiLoading(true);
        try{
          const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:`"${newChallenge}" 주제로 포토 챌린지 미션 10개를 한국어로 만들어줘. 이모지 없이, 각각 한 문장으로, 번호 없이 줄바꿈으로만 구분해서 출력해.`}]})});
          const data=await res.json();
          const t=data.content?.[0]?.text?.trim();
          if(t)setChallenges(p=>[...p,...t.split("\n").map(l=>l.trim()).filter(Boolean).slice(0,10)]);
        }catch{}
        setAiLoading(false);
      }

      function share(code){const msg=`DAYCLIK! 그룹 코드: ${code}`;navigator.clipboard?.writeText(msg).catch(()=>{});alert(`클립보드에 복사됐어요:\n${msg}`);}

      const INP={width:"100%",padding:"11px 15px",borderRadius:13,border:`1.5px solid ${ML}`,background:"#f9feff",color:"#2d3436",fontSize:14,marginBottom:10,boxSizing:"border-box",fontFamily:FONT,outline:"none"};
      const BTN=(bg,col="#fff")=>({width:"100%",padding:"13px",borderRadius:14,border:"none",background:bg,color:col,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:FONT});
      const CARD={background:"#fff",borderRadius:20,overflow:"hidden",marginBottom:14,boxShadow:"0 2px 12px rgba(0,0,0,0.05)"};

      if(!userName) return (
        <div style={{minHeight:"100vh",background:"#f4f5f7",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:28,padding:"36px 28px",width:300,textAlign:"center",boxShadow:`0 8px 32px ${L}`}}>
            <div style={{fontWeight:900,fontSize:32,color:accent,letterSpacing:3,marginBottom:6,fontFamily:JALNAN}}>DAYCLIK!</div>
            <div style={{color:"#90a4ae",fontSize:13,marginBottom:24}}>매시간 새로운 사진 미션</div>
            <input style={INP} placeholder="닉네임 입력" value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&setUserName(nameInput.trim())}/>
            <button style={BTN(accent)} onClick={()=>nameInput.trim()&&setUserName(nameInput.trim())}>시작하기</button>
          </div>
        </div>
      );

      if(!joined) return (
        <div style={{minHeight:"100vh",background:"#f4f5f7",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:28,padding:"36px 28px",width:300,textAlign:"center",boxShadow:`0 8px 32px ${L}`}}>
            <div style={{fontWeight:900,fontSize:28,color:accent,letterSpacing:3,marginBottom:4,fontFamily:JALNAN}}>DAYCLIK!</div>
            <div style={{color:"#90a4ae",fontSize:13,marginBottom:24}}>코드로 친구와 함께해요</div>
            <button style={{...BTN(accent),marginBottom:10}} onClick={()=>{setGroupCode(genCode());setJoined(true);}}>새 그룹 만들기</button>
            <div style={{color:"#ccc",fontSize:12,margin:"4px 0 10px"}}>또는</div>
            <input style={INP} placeholder="그룹 코드 입력" value={inputCode} onChange={e=>setInputCode(e.target.value.toUpperCase())}/>
            <button style={BTN(lighten(accent,0.5),"#fff")} onClick={()=>{if(inputCode.trim()){setGroupCode(inputCode.trim());setJoined(true);}}}>코드로 참여하기</button>
          </div>
        </div>
      );

      if(cameraActive) return (
        <div style={{position:"fixed",inset:0,background:"#000",zIndex:200,display:"flex",flexDirection:"column"}}>
          <video ref={videoRef} style={{flex:1,width:"100%",objectFit:"cover"}} playsInline muted autoPlay/>
          <canvas ref={canvasRef} style={{display:"none"}}/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <span style={{fontSize:120,fontWeight:900,color:"rgba(255,255,255,0.50)",fontFamily:JALNAN,lineHeight:1}}>{timeLeft}</span>
          </div>
          <div style={{position:"absolute",bottom:52,left:0,right:0,display:"flex",justifyContent:"space-around",alignItems:"center",padding:"0 40px"}}>
            <button style={{background:"rgba(255,255,255,0.20)",border:"none",color:"#fff",fontWeight:700,fontSize:15,borderRadius:20,padding:"10px 22px",cursor:"pointer"}} onClick={()=>{stopCamera();setStarted(false);}}>취소</button>
            <button onClick={capturePhoto} style={{width:76,height:76,borderRadius:"50%",background:"rgba(255,255,255,0.88)",border:"4px solid #fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>
              <div style={{width:58,height:58,borderRadius:"50%",background:"#fff",border:`3px solid ${accent}`}}/>
            </button>
            <div style={{width:68}}/>
          </div>
        </div>
      );

      if(uploading) return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:200,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{color:"#fff",fontSize:18,fontWeight:700,marginBottom:12}}>사진 업로드 중...</div>
          <div style={{color:accent,fontSize:13}}>잠깐만 기다려주세요</div>
        </div>
      );

      if(calDetailDay){
        const dp=fsPhotos.filter(p=>p.dateKey===calDetailDay);
        const title=calTitles[calDetailDay]||"";
        return (
          <div style={{minHeight:"100vh",background:"#f4f5f7",maxWidth:393,margin:"0 auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"52px 20px 14px",background:"#fff",borderBottom:`1px solid ${L}`}}>
              <button style={{background:"none",border:"none",color:accent,fontSize:16,cursor:"pointer",fontWeight:700}} onClick={()=>setCalDetailDay(null)}>뒤로</button>
              <span style={{fontWeight:800,fontSize:17}}>{calDetailDay}{title&&` — ${title}`}</span>
              <button style={{background:"none",border:`1.5px solid ${ML}`,color:accent,borderRadius:10,padding:"5px 12px",fontSize:13,cursor:"pointer",fontWeight:700}} onClick={()=>{setCalTitleInput(title);setCalEditModal(calDetailDay);}}>+</button>
            </div>
            <div style={{padding:16}}>
              {dp.length===0?<div style={{textAlign:"center",color:"#90a4ae",padding:"60px 20px",fontSize:14}}>이날의 사진이 없어요</div>
                :dp.map(p=>(
                  <div key={p.id} style={CARD}>
                    <div style={{padding:"12px 14px 8px"}}><div style={{fontWeight:700,fontSize:13}}>{p.user}</div><div style={{fontSize:11,color:"#90a4ae"}}>{p.challenge}</div></div>
                    <img src={p.url} alt="" style={{width:"100%",objectFit:"cover",maxHeight:340}}/>
                    <div style={{padding:"10px 14px 14px"}}>
                      {(p.comments||[]).map((c,ci)=><div key={ci} style={{fontSize:13,color:"#546e7a",marginBottom:6}}><b style={{color:accent}}>{c.user}</b>  {c.text}</div>)}
                      <div style={{display:"flex",gap:8,marginTop:8}}>
                        <input style={{flex:1,padding:"9px 14px",borderRadius:20,border:`1.5px solid ${ML}`,background:"#f9feff",color:"#2d3436",fontSize:13,outline:"none"}} placeholder="댓글 달기"
                          value={commentInputs[p.id]||""} onChange={e=>setCommentInputs(pr=>({...pr,[p.id]:e.target.value}))}
                          onKeyDown={e=>e.key==="Enter"&&addComment(p.id,commentInputs[p.id]||"")}/>
                        <button style={{padding:"9px 16px",borderRadius:20,border:"none",background:"#bbb",color:"#fff",fontWeight:700,cursor:"pointer"}} onClick={()=>addComment(p.id,commentInputs[p.id]||"")}>전송</button>
                      </div>
                    </div>
                  </div>
                ))
              }
            </div>
            {calEditModal&&(
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:"#fff",borderRadius:20,padding:24,width:280}}>
                  <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>제목 수정</div>
                  <input style={INP} maxLength={4} placeholder="4글자 이내로 입력해주세요" value={calTitleInput}
                    onChange={e=>{if(e.target.value.length<=4)setCalTitleInput(e.target.value);}}
                    onKeyDown={e=>{if(calTitleInput.length>=4&&e.key!=="Backspace"&&e.key!=="Delete"&&e.key!=="ArrowLeft"&&e.key!=="ArrowRight")e.preventDefault();}}/>
                  <div style={{fontSize:11,color:"#90a4ae",marginBottom:12}}>{calTitleInput.length}/4</div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={{...BTN("#eee","#666"),flex:1}} onClick={()=>setCalEditModal(null)}>취소</button>
                    <button style={{...BTN(accent),flex:1}} onClick={()=>{setCalTitles(p=>({...p,[calEditModal]:calTitleInput.trim()}));setCalEditModal(null);}}>저장</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return (
        <div style={{minHeight:"100vh",background:"#f4f5f7",color:"#2d3436",maxWidth:393,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"52px 20px 14px",background:"#fff",borderBottom:`1px solid ${L}`}}>
            <span style={{fontWeight:900,fontSize:24,color:accent,letterSpacing:3,fontFamily:JALNAN}}>DAYCLIK!</span>
            <span style={{background:L,color:accent,padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:700}}>#{groupCode}</span>
          </div>
          <div style={{display:"flex",background:"#fff",borderBottom:`1px solid ${L}`,position:"sticky",top:0,zIndex:10}}>
            {MAIN_TABS.map((t,i)=>(
              <button key={i} style={{flex:1,padding:"13px 4px",border:"none",background:"transparent",color:mainTab===i?accent:"#90a4ae",fontSize:13,cursor:"pointer",fontWeight:mainTab===i?700:500,borderBottom:mainTab===i?`2.5px solid ${accent}`:"none"}}
                onClick={()=>{setMainTab(i);setSettingsPage(null);}}>{t}</button>
            ))}
          </div>

          <div style={{padding:"16px 16px 0"}}>
            {mainTab===0&&<>
              <div style={{background:PS,borderRadius:22,padding:"20px",marginBottom:14}}>
                <div style={{color:accent,fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>지금의 챌린지</div>
                <div style={{fontSize:17,fontWeight:700,lineHeight:1.6,color:"#2d3436",marginBottom:18}}>{cur}</div>
                {hasPhoto?<div style={{color:"#26a69a",fontWeight:700,fontSize:15}}>완료! 다음 챌린지를 기다려요</div>
                  :expired?<div style={{color:"#ef9a9a",fontWeight:700,fontSize:15}}>시간이 초과됐어요</div>
                  :<button style={{width:"100%",padding:"14px",borderRadius:16,border:"none",background:accent,color:"#fff",fontWeight:700,fontSize:16,cursor:"pointer"}} onClick={()=>{if(!hasPhoto){setStarted(true);setTimeLeft(60);setExpired(false);openCamera();}}} >챌린지 시작하기</button>
                }
              </div>
              <div style={{background:PS,borderRadius:22,padding:"20px 20px 8px",marginBottom:20}}>
                <div style={{fontWeight:700,fontSize:13,color:accent,marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>Today's Feed</div>
                {todayPhotos.length===0?<div style={{textAlign:"center",color:accent,opacity:0.6,padding:"24px 0 16px",fontSize:14}}>아직 사진이 없어요</div>
                  :todayPhotos.map(p=>(
                    <div key={p.id} style={{background:"#fff",borderRadius:18,overflow:"hidden",marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
                      <div style={{padding:"12px 14px 8px"}}><div style={{fontWeight:700,fontSize:13}}>{p.user}</div><div style={{fontSize:11,color:"#90a4ae"}}>{p.challenge}</div></div>
                      <img src={p.url} alt="" style={{width:"100%",objectFit:"cover",maxHeight:340}}/>
                      <div style={{padding:"10px 14px 14px"}}>
                        {(p.comments||[]).map((c,ci)=><div key={ci} style={{fontSize:13,color:"#546e7a",marginBottom:6}}><b style={{color:accent}}>{c.user}</b>  {c.text}</div>)}
                        <div style={{display:"flex",gap:8,marginTop:8}}>
                          <input style={{flex:1,padding:"9px 14px",borderRadius:20,border:`1.5px solid ${ML}`,background:"#f9feff",color:"#2d3436",fontSize:13,outline:"none"}} placeholder="댓글 달기"
                            value={commentInputs[p.id]||""} onChange={e=>setCommentInputs(pr=>({...pr,[p.id]:e.target.value}))}
                            onKeyDown={e=>e.key==="Enter"&&addComment(p.id,commentInputs[p.id]||"")}/>
                          <button style={{padding:"9px 16px",borderRadius:20,border:"none",background:"#bbb",color:"#fff",fontWeight:700,cursor:"pointer"}} onClick={()=>addComment(p.id,commentInputs[p.id]||"")}>전송</button>
                        </div>
                      </div>
                    </div>
                  ))
                }
              </div>
            </>}

            {mainTab===1&&<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <button style={{background:"none",border:`1.5px solid ${ML}`,color:accent,fontSize:20,cursor:"pointer",padding:"4px 14px",borderRadius:12}} onClick={()=>setCalDate(d=>new Date(d.getFullYear(),d.getMonth()-1,1))}>‹</button>
                <span style={{fontWeight:800,fontSize:18}}>{calDate.getFullYear()}.{String(calDate.getMonth()+1).padStart(2,'0')}</span>
                <button style={{background:"none",border:`1.5px solid ${ML}`,color:accent,fontSize:20,cursor:"pointer",padding:"4px 14px",borderRadius:12}} onClick={()=>setCalDate(d=>new Date(d.getFullYear(),d.getMonth()+1,1))}>›</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:8}}>
                {CAL_DAYS.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:"#90a4ae",padding:"4px 0",fontWeight:600}}>{d}</div>)}
                {Array(getFD(calDate.getFullYear(),calDate.getMonth())).fill(null).map((_,i)=><div key={"e"+i}/>)}
                {Array(getDIM(calDate.getFullYear(),calDate.getMonth())).fill(null).map((_,i)=>{
                  const day=i+1,dk=getDateKey(new Date(calDate.getFullYear(),calDate.getMonth(),day));
                  const dp=fsPhotos.filter(p=>p.dateKey===dk),isToday=dk===today,title=calTitles[dk]||"",hasTitle=!!title,hasP=dp.length>0;
                  return(
                    <div key={day} style={{minHeight:64,background:hasP?L:(hasTitle?lighten(accent,0.07):"#fff"),borderRadius:10,padding:4,border:`1.5px solid ${isToday?accent:"#eee"}`,overflow:"hidden",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start"}}
                      onClick={()=>{if(hasP||hasTitle)setCalDetailDay(dk);else{setCalTitleInput("");setCalTitleModal(dk);}}}>
                      <div style={{fontSize:10,color:"#90a4ae",alignSelf:"flex-start",marginBottom:2}}>{day}</div>
                      {hasP?<img src={dp[0].url} alt="" style={{width:"100%",borderRadius:6,objectFit:"cover",height:32}}/>
                        :hasTitle?<div style={{fontSize:10,fontWeight:700,color:accent,textAlign:"center",whiteSpace:"nowrap",overflow:"hidden",maxWidth:"100%",padding:"2px"}}>{title}</div>
                        :<div style={{fontSize:20,color:"#ccc",lineHeight:1,marginTop:6}}>+</div>}
                    </div>
                  );
                })}
              </div>
              {calTitleModal&&(
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <div style={{background:"#fff",borderRadius:20,padding:24,width:280}}>
                    <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>날짜 제목 추가</div>
                    <div style={{fontSize:12,color:"#90a4ae",marginBottom:14}}>{calTitleModal}</div>
                    <input style={INP} maxLength={4} placeholder="4글자 이내로 입력해주세요" value={calTitleInput}
                      onChange={e=>{if(e.target.value.length<=4)setCalTitleInput(e.target.value);}}
                      onKeyDown={e=>{if(calTitleInput.length>=4&&e.key!=="Backspace"&&e.key!=="Delete"&&e.key!=="ArrowLeft"&&e.key!=="ArrowRight")e.preventDefault();}}/>
                    <div style={{fontSize:11,color:"#90a4ae",marginBottom:12}}>{calTitleInput.length}/4</div>
                    <div style={{display:"flex",gap:8}}>
                      <button style={{...BTN("#eee","#666"),flex:1}} onClick={()=>setCalTitleModal(null)}>취소</button>
                      <button style={{...BTN(accent),flex:1}} onClick={()=>{if(calTitleInput.trim()){setCalTitles(p=>({...p,[calTitleModal]:calTitleInput.trim()}));setCalTitleModal(null);}}}>저장</button>
                    </div>
                  </div>
                </div>
              )}
            </>}

            {mainTab===2&&<>
              {settingsPage===null&&(
                <div style={{background:"#fff",borderRadius:20,overflow:"hidden"}}>
                  {SETTINGS_ITEMS.map((item,i)=>(
                    <button key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"18px 20px",border:"none",background:"transparent",borderBottom:i<SETTINGS_ITEMS.length-1?`1px solid ${L}`:"none",cursor:"pointer",fontSize:15,color:"#2d3436",fontWeight:500,textAlign:"left"}}
                      onClick={()=>setSettingsPage(i)}><span>{item}</span><span style={{color:"#ccc",fontSize:18}}>›</span></button>
                  ))}
                </div>
              )}
              {settingsPage===0&&(
                <div>
                  <button style={{background:"none",border:"none",color:accent,fontSize:15,cursor:"pointer",fontWeight:700,marginBottom:16,padding:0}} onClick={()=>setSettingsPage(null)}>← 뒤로</button>
                  <div style={{background:"#fff",borderRadius:20,padding:24}}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12,marginBottom:20}}>
                      <div style={{width:88,height:88,borderRadius:22,background:L,border:`3px solid ${accent}`,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={()=>profileFileRef.current?.click()}>
                        {profileImg?<img src={profileImg} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:32,color:accent,fontWeight:300}}>+</span>}
                      </div>
                      <input ref={profileFileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setProfileImg(ev.target.result);r.readAsDataURL(f);}}}/>
                      <button style={{fontSize:12,color:accent,background:"none",border:`1px solid ${ML}`,borderRadius:10,padding:"5px 14px",cursor:"pointer"}} onClick={()=>profileFileRef.current?.click()}>프로필 사진 변경</button>
                    </div>
                    <div style={{marginBottom:8,fontWeight:600,fontSize:13,color:"#546e7a"}}>닉네임</div>
                    <input style={INP} value={profileNameEdit||userName} onChange={e=>setProfileNameEdit(e.target.value)}/>
                    <button style={BTN(accent)} onClick={()=>{if((profileNameEdit||userName).trim())setUserName((profileNameEdit||userName).trim());}}>저장</button>
                  </div>
                </div>
              )}
              {settingsPage===1&&(
                <div>
                  <button style={{background:"none",border:"none",color:accent,fontSize:15,cursor:"pointer",fontWeight:700,marginBottom:16,padding:0}} onClick={()=>setSettingsPage(null)}>← 뒤로</button>
                  <div style={{background:"#fff",borderRadius:18,padding:18,marginBottom:14}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>내 그룹 코드</div>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                      <div style={{flex:1,padding:"12px 16px",borderRadius:13,background:L,fontSize:18,fontWeight:900,color:accent,letterSpacing:4,textAlign:"center"}}>{groupCode}</div>
                      <button style={{padding:"12px 16px",borderRadius:13,border:"none",background:accent,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}} onClick={()=>share(groupCode)}>공유</button>
                    </div>
                  </div>
                  <div style={{background:"#fff",borderRadius:18,padding:18}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>친구 추가</div>
                    <div style={{display:"flex",gap:8,marginBottom:16}}>
                      <input style={{...INP,marginBottom:0,flex:1}} placeholder="친구 코드 입력" value={friendInput} onChange={e=>setFriendInput(e.target.value.toUpperCase())}/>
                      <button style={{padding:"11px 16px",borderRadius:13,border:"none",background:accent,color:"#fff",fontWeight:700,cursor:"pointer"}} onClick={()=>{const c=friendInput.trim().toUpperCase();if(!c||friends.find(f=>f.code===c))return;setFriends(p=>[...p,{code:c,name:`친구 (${c})`}]);setFriendInput("");}}>추가</button>
                    </div>
                    {friends.length===0?<div style={{textAlign:"center",color:"#ccc",fontSize:13,padding:"16px 0"}}>아직 친구가 없어요</div>
                      :friends.map((f,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${L}`}}>
                          <div><div style={{fontWeight:700,fontSize:14}}>{f.name}</div><div style={{fontSize:11,color:"#90a4ae"}}>#{f.code}</div></div>
                          <div style={{display:"flex",gap:8}}>
                            <button style={{padding:"7px 14px",borderRadius:10,border:`1px solid ${ML}`,background:"#fff",color:accent,fontSize:12,cursor:"pointer",fontWeight:600}} onClick={()=>share(f.code)}>초대</button>
                            <button style={{padding:"7px 14px",borderRadius:10,border:"none",background:"#ffe0e0",color:"#e57373",fontSize:12,cursor:"pointer",fontWeight:600}} onClick={()=>setFriends(p=>p.filter((_,j)=>j!==i))}>삭제</button>
                          </div>
                        </div>
                      ))
                    }
                  </div>
                </div>
              )}
              {settingsPage===2&&(
                <div>
                  <button style={{background:"none",border:"none",color:accent,fontSize:15,cursor:"pointer",fontWeight:700,marginBottom:16,padding:0}} onClick={()=>setSettingsPage(null)}>← 뒤로</button>
                  <div style={{background:"#fff",borderRadius:18,padding:18,marginBottom:14}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>챌린지 추가</div>
                    <input style={INP} placeholder="주제 입력" value={newChallenge} onChange={e=>setNewChallenge(e.target.value)}/>
                    <button style={BTN(accent)} onClick={()=>{if(newChallenge.trim()){setChallenges(p=>[...p,newChallenge.trim()]);setNewChallenge("");}}}>추가하기</button>
                    <button style={{...BTN("#9b8ec4"),marginTop:8}} onClick={generateAi} disabled={aiLoading}>{aiLoading?"생성 중...":"AI로 챌린지 10개 생성"}</button>
                  </div>
                  <div style={{fontWeight:700,fontSize:12,color:"#90a4ae",marginBottom:10,letterSpacing:1,textTransform:"uppercase"}}>전체 ({challenges.length}개)</div>
                  {challenges.map((c,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff",borderRadius:14,padding:"13px 16px",marginBottom:8}}>
                      <span style={{fontSize:13,flex:1,lineHeight:1.5}}>{c}</span>
                      {i>=DEFAULT_CHALLENGES.length&&<button style={{background:"#ffe0e0",border:"none",color:"#e57373",borderRadius:8,padding:"4px 10px",cursor:"pointer",marginLeft:8,fontWeight:700}} onClick={()=>setChallenges(p=>p.filter((_,j)=>j!==i))}>삭제</button>}
                    </div>
                  ))}
                </div>
              )}
              {settingsPage===3&&(
                <div>
                  <button style={{background:"none",border:"none",color:accent,fontSize:15,cursor:"pointer",fontWeight:700,marginBottom:16,padding:0}} onClick={()=>setSettingsPage(null)}>← 뒤로</button>
                  <div style={{background:"#fff",borderRadius:20,padding:24,marginBottom:14}}>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:14}}>테마 색상 선택</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
                      {[...PRESET_COLORS,...customColors].map((c,i)=>(
                        <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer"}} onClick={()=>setAccent(c.value)}>
                          <div style={{width:"100%",aspectRatio:"1",borderRadius:14,background:c.value,boxShadow:accent===c.value?`0 0 0 3px #fff,0 0 0 5px ${c.value}`:"none",transition:"all .15s"}}/>
                          <span style={{fontSize:10,color:"#546e7a",fontWeight:accent===c.value?700:400,textAlign:"center"}}>{c.name}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{fontWeight:600,fontSize:13,color:"#546e7a",marginBottom:10}}>팔레트에서 직접 추가</div>
                    <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                      <div style={{width:56,height:56,borderRadius:14,overflow:"hidden",flexShrink:0,position:"relative"}}>
                        <input type="color" value={pickerColor} onChange={e=>setPickerColor(e.target.value)}
                          style={{position:"absolute",width:"150%",height:"150%",top:"-25%",left:"-25%",border:"none",cursor:"pointer",padding:0}}/>
                      </div>
                      <div style={{flex:1}}>
                        <input style={{...INP,marginBottom:6}} placeholder="색상 이름" value={pickerName} onChange={e=>setPickerName(e.target.value)}/>
                        <button style={{...BTN(pickerColor),padding:"10px"}} onClick={()=>{if(!pickerName.trim())return;setCustomColors(p=>[...p,{name:pickerName.trim(),value:pickerColor}]);setAccent(pickerColor);setPickerName("");}}>이 색상으로 추가</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </>}
          </div>
          <div style={{height:34,background:"#f4f5f7"}}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
